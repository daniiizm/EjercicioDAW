services:
  web:
    build: ./web
    container_name: daniweb
    ports:
      - "8800:80"
    volumes:
      - ./web/src:/var/www/html
    depends_on:
      - db
    networks:
      - skype
  db:
    image: mysql:latest
    container_name: danidb
    hostname: danidb
    ports:
      - "3369:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/script.sql
    networks:
      - skype
networks:
  skype:
    driver: bridge